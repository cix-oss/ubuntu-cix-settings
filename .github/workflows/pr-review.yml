name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: the-pr-agent/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          OPENAI__API_BASE: "https://coding.dashscope.aliyuncs.com/v1"
          CONFIG__MODEL: "openai/qwen3.7-plus"
          CONFIG__FALLBACK_MODELS: '["openai/qwen3.7-plus"]'
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "131072"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
