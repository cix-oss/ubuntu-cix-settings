name: Build Debian Package

on:
  push:
    branches: [master]
    tags: ['debian/*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: [self-hosted, Linux, ARM64]
    container:
      image: ubuntu:26.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            dpkg-dev debhelper lintian

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p output
          cp "${GITHUB_WORKSPACE}/.."/*.deb output/

      - name: Run lintian
        run: lintian --info --display-level warning output/*.deb || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-cix-settings-debs
          path: output/*.deb
