name: Build Debian Package

on:
  push:
    branches: [master]
    tags: ['debian/*']
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: [self-hosted, Linux, ARM64]
    container:
      image: ubuntu:26.04

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential devscripts equivs lintian
          mk-build-deps --install --tool='apt-get -y --no-install-recommends' debian/control

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p output
          find .. -maxdepth 1 -name '*.deb' -exec cp {} output/ \;

      - name: Run lintian
        run: lintian --info --display-level warning output/*.deb
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-cix-settings-debs
          path: output/*.deb
