name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: qodo-ai/pr-agent-action@main
        env:
          OPENAI.KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          OPENAI.API_BASE: "https://coding.dashscope.aliyuncs.com/v1"
          CONFIG.MODEL: "qwen3.7-plus"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "review"
