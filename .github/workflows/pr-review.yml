name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PR Agent
        env:
          OPENAI_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          OPENAI_API_BASE: "https://coding.dashscope.aliyuncs.com/v1"
          MODEL: "openai/qwen3.7-plus"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          docker run --rm \
            -e OPENAI.KEY="$OPENAI_KEY" \
            -e OPENAI.API_BASE="$OPENAI_API_BASE" \
            -e CONFIG.MODEL="$MODEL" \
            -e GITHUB.USER_TOKEN="$GITHUB_TOKEN" \
            -v "$PWD/.pr_agent.toml:/app/pr_agent/settings/.pr_agent.toml:ro" \
            pragent/pr-agent:latest \
            --pr_url "$PR_URL" review
